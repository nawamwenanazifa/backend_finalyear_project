name: Deploy Laravel Backend → admin.fynbridals.com

on:
  push:
    branches:
      - main  # change to 'master' if needed

jobs:
  deploy:
    name: Zip, Upload & Extract
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────
      # 2. Setup PHP 8.1
      # ─────────────────────────────────────────────────────
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, xml, curl, zip
          coverage: none

      # ─────────────────────────────────────────────────────
      # 3. Cache & install Composer (production only)
      # ─────────────────────────────────────────────────────
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Ensure required directories exist
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/{cache/data,sessions,views}
          mkdir -p storage/logs

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ─────────────────────────────────────────────────────
      # 4. Create production .env with real APP_KEY
      #    First deploy: this .env is used as-is
      #    Later deploys: the server's .env is preserved
      #    (see backup/restore in SSH step below)
      #
      #    After first deploy, edit DB & MAIL values via:
      #    cPanel → File Manager → /home3/fynbridals/backend/.env
      # ─────────────────────────────────────────────────────
      - name: Create production .env
        run: |
          cat > .env << 'ENVFILE'
          APP_NAME="FynBridals Backend"
          APP_ENV=production
          APP_KEY=base64:Xm8dPlbLZC4b+t1u1xH5bWz9LhwV6WFp0nYjubY5uW4=
          APP_DEBUG=false
          APP_URL=https://admin.fynbridals.com

          LOG_CHANNEL=stack
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=localhost
          DB_PORT=3306
          DB_DATABASE=fynbridals_CHANGE_ME
          DB_USERNAME=fynbridals_CHANGE_ME
          DB_PASSWORD=CHANGE_ME

          BROADCAST_DRIVER=log
          CACHE_DRIVER=file
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file
          SESSION_LIFETIME=120

          MAIL_MAILER=smtp
          MAIL_HOST=mail.fynbridals.com
          MAIL_PORT=465
          MAIL_USERNAME=CHANGE_ME
          MAIL_PASSWORD=CHANGE_ME
          MAIL_ENCRYPTION=ssl
          MAIL_FROM_ADDRESS="noreply@fynbridals.com"
          MAIL_FROM_NAME="FynBridals"
          ENVFILE

      # ─────────────────────────────────────────────────────
      # 5. Create the deploy token file (for auth)
      #    This gets uploaded alongside the zip so the
      #    deploy-hook.php can verify the request is legit
      # ─────────────────────────────────────────────────────
      - name: Create deploy token file
        run: echo "${{ secrets.DEPLOY_TOKEN }}" > .deploy_token

      # ─────────────────────────────────────────────────────
      # 6. Zip the project (one file = fast FTP upload)
      #    Excludes: .git, node_modules, tests, dev files
      # ─────────────────────────────────────────────────────
      - name: Zip project files
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*/.git/*" \
            --exclude "*/node_modules/*" \
            --exclude "*/tests/*" \
            --exclude ".editorconfig" \
            --exclude "phpunit.xml" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "postcss.config.js" \
            --exclude "vite.config.js" \
            --exclude "README.md" \
            --exclude "test-simple.ps1" \
            --exclude "deploy.zip"

      # ─────────────────────────────────────────────────────
      # 7. Upload zip + token via FTP
      # ─────────────────────────────────────────────────────
      - name: Upload deploy token via FTP
        run: |
          curl --ftp-create-dirs \
               --retry 3 \
               -T .deploy_token \
               "ftp://${{ secrets.FTP_SERVER }}/backend/.deploy_token" \
               --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"

      - name: Upload zip via FTP
        run: |
          curl --ftp-create-dirs \
               --retry 3 \
               -T deploy.zip \
               "ftp://${{ secrets.FTP_SERVER }}/backend/deploy.zip" \
               --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"

      # ─────────────────────────────────────────────────────
      # 8. Trigger the deploy hook via HTTP
      #    This calls public/deploy-hook.php on the server
      #    which extracts the zip and runs artisan commands.
      #    Token is sent via header (not URL) to avoid
      #    issues with special characters in passwords.
      # ─────────────────────────────────────────────────────
      - name: Run deploy hook (extract, migrate, cache)
        run: |
          echo "🚀 Triggering deploy hook..."

          # Try HTTP first (SSL might not be set up on subdomain)
          RESPONSE=$(curl -s --max-time 120 -w "\nHTTP_CODE:%{http_code}" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            "http://admin.fynbridals.com/deploy-hook.php" 2>&1) || true

          HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')

          echo "$BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Deploy hook completed successfully"
          else
            echo "⚠️ HTTP deploy hook returned $HTTP_CODE — trying HTTPS..."
            RESPONSE=$(curl -s --max-time 120 -w "\nHTTP_CODE:%{http_code}" \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
              "https://admin.fynbridals.com/deploy-hook.php" 2>&1) || true

            HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
            BODY=$(echo "$RESPONSE" | sed '/HTTP_CODE:/d')
            echo "$BODY"
            echo "HTTP Status: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Deploy hook completed successfully (HTTPS)"
            else
              echo "❌ Deploy hook failed with HTTP $HTTP_CODE"
              echo "Note: You may need to set up the subdomain first in cPanel"
              exit 1
            fi
          fi
