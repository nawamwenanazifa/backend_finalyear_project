name: Deploy Laravel Backend → admin.fynbridals.com

on:
  push:
    branches:
      - main  # change to 'master' if needed

jobs:
  deploy:
    name: Zip, Upload & Extract
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────
      # 2. Setup PHP 8.1
      # ─────────────────────────────────────────────────────
      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo_mysql, xml, curl, zip
          coverage: none

      # ─────────────────────────────────────────────────────
      # 3. Cache & install Composer (production only)
      # ─────────────────────────────────────────────────────
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ─────────────────────────────────────────────────────
      # 4. Create production .env with real APP_KEY
      #    First deploy: this .env is used as-is
      #    Later deploys: the server's .env is preserved
      #    (see backup/restore in SSH step below)
      #
      #    After first deploy, edit DB & MAIL values via:
      #    cPanel → File Manager → /home3/fynbridals/backend/.env
      # ─────────────────────────────────────────────────────
      - name: Create production .env
        run: |
          cat > .env << 'ENVFILE'
          APP_NAME="FynBridals Backend"
          APP_ENV=production
          APP_KEY=base64:Xm8dPlbLZC4b+t1u1xH5bWz9LhwV6WFp0nYjubY5uW4=
          APP_DEBUG=false
          APP_URL=https://admin.fynbridals.com

          LOG_CHANNEL=stack
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=localhost
          DB_PORT=3306
          DB_DATABASE=fynbridals_CHANGE_ME
          DB_USERNAME=fynbridals_CHANGE_ME
          DB_PASSWORD=CHANGE_ME

          BROADCAST_DRIVER=log
          CACHE_DRIVER=file
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          SESSION_DRIVER=file
          SESSION_LIFETIME=120

          MAIL_MAILER=smtp
          MAIL_HOST=mail.fynbridals.com
          MAIL_PORT=465
          MAIL_USERNAME=CHANGE_ME
          MAIL_PASSWORD=CHANGE_ME
          MAIL_ENCRYPTION=ssl
          MAIL_FROM_ADDRESS="noreply@fynbridals.com"
          MAIL_FROM_NAME="FynBridals"
          ENVFILE

      # ─────────────────────────────────────────────────────
      # 5. Zip the project (one file = fast FTP upload)
      #    Excludes: .git, node_modules, tests, dev files
      # ─────────────────────────────────────────────────────
      - name: Zip project files
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "*/.git/*" \
            --exclude "*/node_modules/*" \
            --exclude "*/tests/*" \
            --exclude ".editorconfig" \
            --exclude "phpunit.xml" \
            --exclude "package.json" \
            --exclude "package-lock.json" \
            --exclude "postcss.config.js" \
            --exclude "vite.config.js" \
            --exclude "README.md" \
            --exclude "test-simple.ps1" \
            --exclude "deploy.zip"

      # ─────────────────────────────────────────────────────
      # 6. Upload the single zip file via FTP
      #    Much faster than uploading hundreds of files
      # ─────────────────────────────────────────────────────
      - name: Upload zip via FTP
        run: |
          curl --ftp-create-dirs \
               --retry 3 \
               -T deploy.zip \
               "ftp://${{ secrets.FTP_SERVER }}/backend/deploy.zip" \
               --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"

      # ─────────────────────────────────────────────────────
      # 7. SSH: extract zip, preserve .env, run artisan cmds
      # ─────────────────────────────────────────────────────
      - name: Extract & setup via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: fynbridals
          password: ${{ secrets.DEPLOY_TOKEN }}
          port: 22
          script: |
            set -e
            cd /home3/fynbridals/backend

            echo "📦 Backing up .env if it exists..."
            [ -f .env ] && cp .env .env.bak

            echo "📂 Extracting deploy.zip..."
            unzip -o deploy.zip
            rm -f deploy.zip

            echo "🔒 Restoring .env (keeping your configured values)..."
            [ -f .env.bak ] && mv .env.bak .env && echo ".env restored from backup"

            echo "🔑 Setting storage permissions..."
            chmod -R 775 storage bootstrap/cache

            echo "🔗 Creating storage symlink..."
            php artisan storage:link || true

            echo "🗄️  Running migrations..."
            php artisan migrate --force || echo "⚠️  Migrations skipped — update .env DB values first"

            echo "⚡ Caching config, routes, views..."
            php artisan config:cache || true
            php artisan route:cache  || true
            php artisan view:cache   || true

            echo "✅ Deployment complete → https://admin.fynbridals.com"
